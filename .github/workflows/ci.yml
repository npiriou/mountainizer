name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-release-gate:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"
      - name: Verify build, tests, CLI, and self-contained release
        shell: pwsh
        run: ./tools/verify-release.ps1
